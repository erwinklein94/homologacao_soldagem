<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dados &amp; provas · Rumo</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="css/rumo.css" />
</head>
<body>
  <header class="topbar" data-topbar></header>

  <main class="page">
    <div data-config-aviso></div>

    <div class="page__head">
      <div class="eyebrow">Área do administrador</div>
      <h1>Dados &amp; provas</h1>
      <p class="muted">Acompanhe as avaliações dos alunos e edite as provas e questões.</p>
    </div>

    <div data-seed-banner class="hidden" style="margin-bottom:1.2rem"></div>

    <div class="tabs" style="max-width:620px">
      <button type="button" class="is-active" data-aba="atividades">Atividades dos alunos</button>
      <button type="button" class="hidden" data-aba="historico" data-aba-historico-btn>Histórico</button>
      <button type="button" data-aba="provas">Editar provas</button>
    </div>

    <section data-painel-aba="atividades">
      <div data-atividades></div>
    </section>

    <section data-painel-aba="historico" class="hidden">
      <div data-historico></div>
    </section>

    <section data-painel-aba="provas" class="hidden">
      <div data-editor></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/seed-data.js"></script>
  <script src="js/historico-alivio-tensao.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
