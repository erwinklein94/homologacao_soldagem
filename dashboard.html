<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel · Rumo</title>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="stylesheet" href="css/rumo.css" />
</head>
<body>
  <header class="topbar" data-topbar></header>

  <main class="page">
    <div data-config-aviso></div>

    <div class="page__head">
      <div class="eyebrow">Área do administrador</div>
      <h1>Painel de desempenho</h1>
      <p class="muted">Visão geral das provas, aprovações e evolução dos alunos.</p>
    </div>

    <section class="kpis" data-kpis style="margin-bottom:1.4rem"></section>

    <section class="hidden" data-filtros-historico style="margin-bottom:1.4rem"></section>

    <section class="grafico-grid" data-graficos>
      <div class="grafico-card">
        <h3>Distribuição de notas</h3>
        <div class="grafico-card__canvas"><canvas id="chart-notas"></canvas></div>
      </div>
      <div class="grafico-card">
        <h3>Provas realizadas por mês</h3>
        <div class="grafico-card__canvas"><canvas id="chart-mes"></canvas></div>
      </div>
      <div class="grafico-card">
        <h3>Aprovação x reprovação</h3>
        <div class="grafico-card__canvas"><canvas id="chart-aprovacao"></canvas></div>
      </div>
      <div class="grafico-card">
        <h3>Novos alunos por mês</h3>
        <div class="grafico-card__canvas"><canvas id="chart-alunos"></canvas></div>
      </div>
      <div class="grafico-card" style="grid-column:1/-1">
        <h3>Média de nota por prova</h3>
        <div class="grafico-card__canvas"><canvas id="chart-prova"></canvas></div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="js/historico-alivio-tensao.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
